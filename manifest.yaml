id: dev.sirosh.keyboard-companion
runtime: org.kde.Platform
runtime-version: "6.10"
base: com.riverbankcomputing.PyQt.BaseApp
base-version: "6.10"
sdk: org.kde.Sdk
command: keyboard-companion-launcher

build-options:
  build-args:
    - --share=network

finish-args:
  - --share=ipc
  - --env=QT_QPA_PLATFORM=wayland
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --filesystem=home:ro
  - --device=all #TODO make narrower scope
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.mpris.MediaPlayer2.*
  - --talk-name=org.mpris.MediaPlayer2.*
  - --talk-name=org.freedesktop.DBus
  - --talk-name=org.kde.keyboard
  - --talk-name=org.freedesktop.IBus.Engine
  - --talk-name=org.freedesktop.IBus
modules:
  - name: keyboard-companion
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --prefix=${FLATPAK_DEST} -r requirements-flatpak.txt

      - mkdir -p /app/bin /app/lib/python3.13/site-packages/keyboard-companion
      - cp -r src/* /app/lib/python3.13/site-packages/keyboard-companion/

      - |
        cat > /app/bin/keyboard-companion-launcher << 'eof'
        #!/bin/sh
        export PYTHONPATH="/app/lib/python3.13/site-packages:${PYTHONPATH:-}"
        if [ $# -eq 0 ]; then
            exec python3 /app/lib/python3.13/site-packages/keyboard-companion/sync.py gui
        else
            exec python3 /app/lib/python3.13/site-packages/keyboard-companion/sync.py "$@"
        fi
        eof
      - chmod +x /app/bin/keyboard-companion-launcher
      - install -Dm644 src/assets/keyboard-companion.desktop /app/share/applications/dev.sirosh.keyboard-companion.desktop
      - install -Dm644 src/assets/icon.png /app/share/icons/hicolor/128x128/apps/dev.sirosh.keyboard-companion.png
    sources:
      - type: dir
        path: .
